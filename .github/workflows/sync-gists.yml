name: Sync Install Scripts to Public Gists

on:
  push:
    branches: [main]
    paths:
      - 'scripts/install.ps1'
      - 'scripts/install.sh'
      - '.github/workflows/sync-gists.yml'

  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check secrets
        run: |
          missing=""
          if [ -z "${{ secrets.GIST_PAT }}" ]; then
            missing="$missing GIST_PAT"
          fi
          if [ -z "${{ secrets.GIST_ID_PS1 }}" ]; then
            missing="$missing GIST_ID_PS1"
          fi
          if [ -z "${{ secrets.GIST_ID_SH }}" ]; then
            missing="$missing GIST_ID_SH"
          fi
          if [ -n "$missing" ]; then
            echo "::error::Missing secrets:$missing. Run scripts/setup_gists.py locally to create gists, then add the IDs and a PAT with 'gist' scope to Settings -> Secrets."
            exit 1
          fi

      - name: Sync install.ps1 to Gist via GitHub API
        env:
          GIST_PAT: ${{ secrets.GIST_PAT }}
          GIST_ID: ${{ secrets.GIST_ID_PS1 }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request
          gist_id = os.environ['GIST_ID']
          pat = os.environ['GIST_PAT']
          with open('scripts/install.ps1', 'r', encoding='utf-8') as f:
              content = f.read()
          payload = json.dumps({"files": {"install.ps1": {"content": content}}}).encode('utf-8')
          req = urllib.request.Request(
              f'https://api.github.com/gists/{gist_id}',
              data=payload,
              headers={
                  'Authorization': f'token {pat}',
                  'Accept': 'application/vnd.github.v3+json',
                  'Content-Type': 'application/json',
              },
              method='PATCH'
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  print(f"install.ps1 synced. HTTP {resp.status}")
          except urllib.error.HTTPError as e:
              print(f"Error: HTTP {e.code}")
              print(e.read().decode())
              exit(1)
          PYEOF

      - name: Sync install.sh to Gist via GitHub API
        env:
          GIST_PAT: ${{ secrets.GIST_PAT }}
          GIST_ID: ${{ secrets.GIST_ID_SH }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request
          gist_id = os.environ['GIST_ID']
          pat = os.environ['GIST_PAT']
          with open('scripts/install.sh', 'r', encoding='utf-8') as f:
              content = f.read()
          payload = json.dumps({"files": {"install.sh": {"content": content}}}).encode('utf-8')
          req = urllib.request.Request(
              f'https://api.github.com/gists/{gist_id}',
              data=payload,
              headers={
                  'Authorization': f'token {pat}',
                  'Accept': 'application/vnd.github.v3+json',
                  'Content-Type': 'application/json',
              },
              method='PATCH'
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  print(f"install.sh synced. HTTP {resp.status}")
          except urllib.error.HTTPError as e:
              print(f"Error: HTTP {e.code}")
              print(e.read().decode())
              exit(1)
          PYEOF
